<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#165DFF"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#165DFF"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>
  
  <!-- Tech Grid Pattern -->
  <g opacity="0.1">
    <line x1="20" y1="40" x2="180" y2="40" stroke="white" stroke-width="0.5"/>
    <line x1="20" y1="80" x2="180" y2="80" stroke="white" stroke-width="0.5"/>
    <line x1="20" y1="120" x2="180" y2="120" stroke="white" stroke-width="0.5"/>
    <line x1="20" y1="160" x2="180" y2="160" stroke="white" stroke-width="0.5"/>
    <line x1="40" y1="20" x2="40" y2="180" stroke="white" stroke-width="0.5"/>
    <line x1="80" y1="20" x2="80" y2="180" stroke="white" stroke-width="0.5"/>
    <line x1="120" y1="20" x2="120" y2="180" stroke="white" stroke-width="0.5"/>
    <line x1="160" y1="20" x2="160" y2="180" stroke="white" stroke-width="0.5"/>
  </g>
  
  <!-- Code Brackets -->
  <g fill="none" stroke="white" stroke-width="3" stroke-linecap="round">
    <path d="M65 70 L45 100 L65 130"/>
    <path d="M135 70 L155 100 L135 130"/>
    <path d="M90 75 L110 75" opacity="0.6"/>
    <path d="M90 125 L110 125" opacity="0.6"/>
  </g>
  
  <!-- Accent Ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="10 5" opacity="0.5"/>
  
  <!-- Center Icon - Person Silhouette -->
  <circle cx="100" cy="85" r="18" fill="white" opacity="0.95"/>
  <path d="M70 140 Q70 110 100 110 Q130 110 130 140" fill="white" opacity="0.95"/>
  
  <!-- Decorative Elements -->
  <circle cx="45" cy="55" r="3" fill="#00D4AA"/>
  <circle cx="155" cy="55" r="3" fill="#00D4AA"/>
  <circle cx="45" cy="145" r="3" fill="#00D4AA"/>
  <circle cx="155" cy="145" r="3" fill="#00D4AA"/>
</svg>
